<div class="Student-wrapper">
  <div class="Student-card">
    <h3 class="text-center mb-4">Student Registration Form</h3>
    <div class="form-group mb-3">
      <label class="form-label">RollNo:</label>
      <input type="text" class="form-control-sm" [(ngModel)]="RollNoInputValue" />{{
        RollNoInputValue
      }}
    </div>
    <div class="form-group mb-3">
      <label class="form-label">Student Name:</label>
      <input type="text" class="form-control-sm" /> - <input type="text" class="form-control-sm" />
    </div>
    <div class="form-group mb-3">
      <label class="form-label">Father Name:</label>
      <input type="text" class="form-control-sm" />
    </div>
    <div class="form-group mb-3">
      <label class="form-label">Date of Birth:</label>
      <input type="date" class="form-control-sm" [(ngModel)]="dob" />{{ dob }}
    </div>
    <div class="form-group mb-3">
      <label class="form-label">Mobile number:</label>
      <input type="text" value="+91" size="5" readonly /> -
      <input type="number" class="form-control-sm" [(ngModel)]="mobileno" />
      {{ mobileno }}
    </div>
    <div class="form-group mb-3">
      <label class="form-label">Email Address:</label>
      <input id="email" type="email" class="form-control-sm" placeholder="name@company.com" />
    </div>
    <div class="form-group mb-3">
      <label class="form-label">Password:</label>
      <input id="password" class="form-control-sm" type="password" placeholder="••••••••" />
    </div>
    <div class="form-group mb-3">
      <label class="form-label">Gender:</label>
      <select [(ngModel)]="menu">
        <option selected disabled value="">Choose...</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>
      <span> Gender: {{ menu }}</span>
    </div>
    <div class="form-group mb-3">
      <label class="form-label">Department:</label>
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="check1" />
        <label class="form-check-label" for="check1">IT</label>
      </div>

      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="check2" />
        <label class="form-check-label" for="check2">CSE</label>
      </div>
    </div>
    <div class="form-group mb-3">
      <label class="form-label">Course:</label>
      <select [(ngModel)]="course">
        <option selected disabled value="">Choose...</option>
        <option value="Digital Signal">Digital Signal</option>
        <option value="Information technology">Information technology</option>
      </select>
      <span> Course: {{ course }}</span>
    </div>
    <div class="form-group mb-3">
      <label class="form-label">Address:</label>
      <textarea [(ngModel)]="Address"></textarea>
      {{ Address }}
    </div>

    <div class="form-group mb-3">
      <input type="button" title="Register" value="Register" />
    </div>
  </div>
</div>
